<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integration Tree — Card Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap');

  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --border: rgba(255,255,255,0.08);
    --text: #e8e4d8;
    --muted: rgba(232,228,216,0.45);
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; }

  /* ── Header ── */
  header { padding: 1.5rem 1.5rem 1rem; text-align: center; border-bottom: 1px solid var(--border); position: relative; }
  header::after { content:''; position:absolute; bottom:-1px; left:50%; transform:translateX(-50%); width:60px; height:1px; background:var(--gold); }
  .logo { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.25em; color:var(--gold); margin-bottom:0.3rem; }
  h1 { font-size:1.3rem; font-weight:300; font-style:italic; }

  /* ── Selected Tray ── */
  #tray {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,16,0.97);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
    display: none;
    flex-direction: column;
    gap: 0.5rem;
    backdrop-filter: blur(8px);
  }
  #tray.visible { display: flex; }
  .tray-chips {
    display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center;
  }
  .tray-chip {
    display: flex; align-items: center; gap: 0.3rem;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 3px;
    padding: 0.2rem 0.5rem;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    cursor: pointer;
  }
  .tray-chip .remove { font-size: 0.7rem; opacity: 0.6; margin-left: 0.1rem; }
  .tray-actions { display: flex; gap: 0.5rem; }
  .btn-view {
    flex: 1;
    background: var(--gold);
    color: #080810;
    border: none;
    border-radius: 3px;
    padding: 0.45rem 1rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.45rem 0.75rem;
    color: var(--muted);
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    cursor: pointer;
  }

  /* ── Controls ── */
  .controls { padding: 1rem 1.5rem 0.5rem; display: flex; flex-direction: column; gap: 0.65rem; }
  .search-wrap { position: relative; }
  .search-wrap::before { content:'✦'; position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:var(--gold); font-size:0.6rem; pointer-events:none; }
  input[type="search"] { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:0.6rem 1rem 0.6rem 2.2rem; color:var(--text); font-family:'Cormorant Garamond',serif; font-size:1rem; outline:none; transition:border-color 0.2s; }
  input[type="search"]:focus { border-color: rgba(201,168,76,0.4); }
  input[type="search"]::placeholder { color: var(--muted); }
  .filters { display:flex; gap:0.4rem; flex-wrap:wrap; }
  .filter-btn { background:transparent; border:1px solid var(--border); border-radius:2px; padding:0.28rem 0.65rem; color:var(--muted); font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s; }
  .filter-btn.active, .filter-btn:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
  .count { padding: 0 1.5rem 0.4rem; font-size:0.78rem; color:var(--muted); font-style:italic; }

  /* ── Card List ── */
  .card-list { padding: 0 1rem 6rem; display: flex; flex-direction: column; gap: 0.35rem; }

  .card-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    overflow: hidden;
    user-select: none;
  }
  .card-item:hover { border-color: rgba(201,168,76,0.25); }
  .card-item.selected {
    border-color: rgba(201,168,76,0.6);
    background: rgba(201,168,76,0.06);
  }

  .card-header { display:flex; align-items:center; gap:0.65rem; padding:0.65rem 0.9rem; }
  .check-box {
    width: 1.1rem; height: 1.1rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    color: var(--gold);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .card-item.selected .check-box { background: var(--gold-dim); border-color: var(--gold); }
  .card-symbol { font-size:1.2rem; width:1.5rem; text-align:center; flex-shrink:0; line-height:1; }
  .card-title-wrap { flex:1; min-width:0; }
  .card-name { font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.08em; color:var(--text); display:block; }
  .card-sub { font-size:0.75rem; color:var(--muted); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
  .card-type-badge { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:0.08em; padding:0.12rem 0.4rem; border-radius:2px; border:1px solid; flex-shrink:0; }
  .badge-Sephirot { border-color:rgba(170,170,255,0.3); color:#aaaaff; }
  .badge-Hebrew   { border-color:rgba(255,220,100,0.3); color:#ffdd88; }
  .badge-World    { border-color:rgba(100,220,180,0.3); color:#66ddbb; }
  .badge-Rune     { border-color:rgba(220,150,100,0.3); color:#dd9966; }

  /* ── View Modal ── */
  #viewModal {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(4,4,8,0.97);
    overflow-y: auto;
    padding: 0 0 4rem;
    flex-direction: column;
  }
  #viewModal.open { display: flex; }

  .modal-header {
    position: sticky; top: 0;
    background: rgba(4,4,8,0.98);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .modal-title { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.18em; color:var(--gold); }
  .btn-close { background:transparent; border:1px solid var(--border); border-radius:3px; padding:0.3rem 0.7rem; color:var(--muted); font-family:'Cinzel',serif; font-size:0.6rem; cursor:pointer; letter-spacing:0.1em; }
  .btn-close:hover { border-color:var(--gold); color:var(--gold); }

  .modal-cards { padding: 1rem; display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
  @media (min-width: 640px) {
    .modal-cards { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 1024px) {
    .modal-cards { grid-template-columns: repeat(3, 1fr); }
  }

  .modal-card {
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 6px;
    overflow: hidden;
  }
  .modal-card-header {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: rgba(201,168,76,0.05);
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .modal-symbol { font-size: 1.5rem; line-height:1; }
  .modal-name { font-family:'Cinzel',serif; font-size:0.85rem; letter-spacing:0.1em; color:var(--gold); }
  .modal-sub { font-size:0.8rem; color:var(--muted); font-style:italic; }

  .modal-card-body { padding: 1rem; }
  .modal-img-wrap { display:flex; justify-content:center; margin-bottom:1rem; }
  .modal-img { width:130px; border-radius:4px; box-shadow:0 6px 24px rgba(0,0,0,0.6); display:block; }
  .img-placeholder { width:130px; aspect-ratio:2/3; border-radius:4px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.03); border:1px solid var(--border); font-size:2rem; color:var(--muted); }

  .modal-keywords { font-size:0.75rem; color:var(--gold); font-style:italic; margin-bottom:1rem; line-height:1.5; }
  .modal-section { margin-bottom:0.85rem; }
  .modal-label { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.16em; color:var(--muted); text-transform:uppercase; margin-bottom:0.3rem; display:flex; align-items:center; gap:0.4rem; }
  .modal-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .modal-text { font-size:0.9rem; line-height:1.75; color:var(--text); }

  .no-results { text-align:center; padding:3rem 1rem; color:var(--muted); font-style:italic; font-size:0.95rem; display:none; }
</style>
</head>
<body>

<header>
  <div class="logo">Awai no Amayadori</div>
  <h1>The Integration Tree</h1>
</header>

<!-- Selected Tray -->
<div id="tray">
  <div class="tray-chips" id="trayChips"></div>
  <div class="tray-actions">
    <button class="btn-view" id="btnView">選んだカードを見る</button>
    <button class="btn-clear" id="btnClear">クリア</button>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="search-wrap">
    <input type="search" id="search" placeholder="カード名・キーワードで検索…" autocomplete="off">
  </div>
  <div class="filters">
    <button class="filter-btn active" data-type="all">すべて</button>
    <button class="filter-btn" data-type="Sephirot">Sephirot</button>
    <button class="filter-btn" data-type="Hebrew">Hebrew</button>
    <button class="filter-btn" data-type="World">World</button>
    <button class="filter-btn" data-type="Rune">Rune</button>
  </div>
</div>
<div class="count" id="count"></div>
<div class="card-list" id="cardList"></div>
<div class="no-results" id="noResults">カードが見つかりませんでした</div>

<!-- View Modal -->
<div id="viewModal">
  <div class="modal-header">
    <span class="modal-title" id="modalTitle">SELECTED CARDS</span>
    <button class="btn-close" id="btnClose">✕ 閉じる</button>
  </div>
  <div class="modal-cards" id="modalCards"></div>
</div>

<script>
const BASE = 'https://fortune-five-psi.vercel.app/oracle/';
const CARDS = [
  { id:'daat',name:"DA'AT",type:'Sephirot',subs:['Gate of the Abyss',"Readiness to face one's depths"],symbol:'Ø',symbolColor:'#88ffcc',keywords:'知識・深淵の扉・土星・ギメルのラクダが通過する扉・ビフロストへの接続点',upright:'これまで積み重ねてきた努力・喜び・試練のすべてが一つの巨大な知恵として完全に融合しようとしている。天の直感と地上のリアルな経験がピタッと噛み合い、新しい次元へとシフトする人生の大きな特異点。あなたが歩いてきたすべての道が、深いところでは無駄なく、今ここに繋がっている。',reversed:'人生において最も核心に触れる大事なテーマと向き合っているがゆえの、神聖な足止め。「ここを超えられなければ終わりだ」という思い込みから、巨大で冷たい壁が見えている。しかしその「目詰まり」こそが、大反転のトリガーになる。'},
  { id:'kether',name:'KETHER',type:'Sephirot',subs:['The Crown','Pure Existence'],symbol:'✦',symbolColor:'#ffffff',keywords:'王冠・純粋な存在・無限の可能性・直感・根拠のない確信',upright:'まだ何の色もついていない、純粋な「私は私である」という存在の全肯定。無限の可能性。あなたの「直感」や「根拠のない確信」に強烈な守護が入っている。外側で何が起ころうと深呼吸をしてその場にちゃんと立てる。',reversed:'ありのままの自分では世界に存在してはいけないという恐怖。「完璧でなければ価値がない」という思い込みが100点か0点かの極端な世界を見せている。怖がっている自分を、抱きしめていよう。'},
  { id:'chokmah',name:'CHOKMAH',type:'Sephirot',subs:['Wisdom','Pure Inspiration'],symbol:'⊕',symbolColor:'#aaddff',keywords:'知恵・ロジックなしの直感・アイデアの爆発・衝動的なパッション',upright:'ロジックなしの直感、アイデアの爆発。採算や他人の納得はいらない。あなたの「思いつき」や「衝動的なパッション」そのものに強烈な追い風が吹いている。',reversed:'自分の直感や感性を、過去にロジックや常識という檻に閉じ込められ、鎖に繋がれた危機感と支配への怒り。自らの感性を守るために、すべてを破壊するという防衛手段も厭わないかもしれない。そのくやしさと苦しさは必ず強いバネになる。'},
  { id:'binah',name:'BINAH',type:'Sephirot',subs:['Understanding','Form from Chaos'],symbol:'△',symbolColor:'#cc88ff',keywords:'理解・混沌に形を与えること・深い受容・母なる器・制限',upright:'深い理解と受容と厳しさ。形のないものに形を与え、守り育てるしなやかな知性。母なる器。感性がリアルな形を伴って世界に表現していくことを強くサポートしてくれる。',reversed:'自らの感性を信じられず、混沌の中で傷つき、見捨てられるという恐怖。「絶対にコントロールできるルール」という命綱が必要だった。その傷や恐怖が新しい居場所を創り出す最高の鍵に変わる。'},
  { id:'chesed',name:'CHESED',type:'Sephirot',subs:['Mercy','Unconditional Love'],symbol:'♃',symbolColor:'#ffdd88',keywords:'慈悲・無条件の肯定と受容・大いなる慈悲・無限の拡大と豊かさ',upright:'大いなる慈悲、無限の拡大と豊かさそのもののエネルギー。「受け入れる力」や「育てるエネルギー」に強烈な追い風。守りに入るより流れに身を任せて循環させるとき。',reversed:'無条件で受け止められた経験が乏しく、「与え続けなければ見捨てられる」という深い飢餓感。尽くすことでしか価値がないと感じた苦しみが、本当の聖域を現実に創り出す最高の鍵になる。'},
  { id:'geburah',name:'GEBURAH',type:'Sephirot',subs:['Strength','Sacred Judgment'],symbol:'♂',symbolColor:'#ff6644',keywords:'峻厳・適切な境界線の確立・本質ではないものを断ち切るNOの力・尊厳を守るための神聖な裁き',upright:'本質ではないものを断ち切るNOの力。尊厳を守るための神聖な裁き。「これ以上自分を安売りしなくていい」という強い守護。自分が守りたい領域をはっきりさせるチャンス。',reversed:'大切な領域を土足で踏みにじられたり、侵害されてきた無力感。自分の尊厳をどんな形でも守ろうとしたプライドこそ、自分自身や大切に思う人を防衛する盾となる。'},
  { id:'tiphareth',name:'TIPHARETH',type:'Sephirot',subs:['Beauty','The True Self'],symbol:'☀',symbolColor:'#ffcc00',keywords:'美・自己統合とありのままの輝き・中心軸（セルフ）とつながる太陽のような調和と美しさ',upright:'自分の中心軸（セルフ）とつながる太陽のような調和と美しさ。一番大切な価値観。「本当に在りたい生き方」や「等身大の自己表現」への強烈なスポットライト。',reversed:'ありのままの未完成な自分では無視され、愛されないと感じた拒絶の痛み。自分には価値が無いと思う苦しみの記憶は、あなた自身だけの美しさを開花させるための最高の鍵になる。'},
  { id:'netzach',name:'NETZACH',type:'Sephirot',subs:['Victory','Wild Emotion'],symbol:'♀',symbolColor:'#88ff88',keywords:'勝利・野生の感情の解放・理由のない「大好き！」「心地いい！」というエモーショナルな熱量と芸術的感性',upright:'理由のない「大好き！」「心地いい！」というエモーショナルな熱量と芸術的感性。「正しさ」より「楽しさ・心地よさ」を選ぶとき。感覚を爆発させている姿そのものが最大の魅力になる。',reversed:'純粋な好きという気持ちや繊細な感覚を、過去に「くだらない」と踏みにじられた失望。言葉にできない美しさや違和感を丁寧に拾い上げる圧倒的な共鳴力は、閉ざされた心を一瞬で融かす最高の魔法になる。'},
  { id:'hod',name:'HOD',type:'Sephirot',subs:['Splendor','Language of Sensation'],symbol:'☿',symbolColor:'#ffaa44',keywords:'栄光・感覚の言語化と客観的な知性・モヤモヤした感覚に名前を与える明晰さ',upright:'モヤモヤした感覚に名前を与え、ロジックやシステムとして鮮やかに翻訳・整理する明晰さ。「伝える力」や「分析する知性」に強力なサポート。',reversed:'リアルな感情をそのまま出したとき、理不尽に言いくるめられたり嘘つき呼ばわりされた悔しさ。感覚を自らの言葉で翻訳する言語化能力は、誰かの閉ざされた部分を開ける最高のきっかけになる。'},
  { id:'yesod',name:'YESOD',type:'Sephirot',subs:['Foundation','The Dreaming Ground'],symbol:'☽',symbolColor:'#aaaaff',keywords:'基盤・潜在意識の力と豊かなイマジネーション・夢や幻想・インスピレーションの活性化',upright:'夢や幻想、インスピレーションの活性化。現実化を足元から引き寄せる磁石（心の土台）。無意識のセンサーに強力な追い風。「本当にしたいこと」をじっくり味わうほど、心が満たされる時。',reversed:'リアルな過去が過酷だったり、辛い記憶が多く、直視するのがくるしすぎるほどだった傷。内なる世界の中に命のシェルターを作ってここまで生き延びた、その内側の世界と知恵こそが人生の土台へと変化していく。'},
  { id:'malkuth',name:'MALKUTH',type:'Sephirot',subs:['Kingdom','Earth Embodied'],symbol:'⊕',symbolColor:'#bb8844',keywords:'王国・現実化と肉体を持った行動・アイデアやイメージを3次元の地球で結晶化させる力',upright:'アイデアやイメージをこの3次元の地球で「目に見える形」として結晶化させる力。グラウンディングへの強烈な守護。具体的なタスクを淡々とこなすとき、地球そのものが足元をガシッと支えてくれる。',reversed:'目に見えない約束や愛を信じた結果、裏切られたり、足元をすくわれる恐怖を味わった傷。物事をリアルに着地させる具体化の力として、理想を地上に結晶化させる最高の鍵になる。'},
  { id:'aleph',name:'ALEPH',type:'Hebrew',subs:['The Fool (0)','Pure Possibility'],symbol:'א',symbolColor:'#ffffff',keywords:'愚者・無から飛び出す純粋な可能性・計算や損得を脇に置いた無垢さ・風元素',upright:'何も決まっていない、何の色もついていない。だからこそ、ここから何にだってなれる純粋な「存在の始まり」のエネルギー。「言葉にならない沈黙」の中にある、やってみたいけど現実的ではないと感じるようなことに、最も神聖な力が背中を押している。',reversed:'可能性を信じるのが怖くなるくらい、過去に自分の純粋な衝動を笑われたり踏みにじられた傷があったかもしれない。でも、あなたの魂の奥底にある「純粋な風（アレフ）」は1ミリも死んでいない。'},
  { id:'beth',name:'BETH',type:'Hebrew',subs:['The Magician (I)','Will into Form'],symbol:'ב',symbolColor:'#ffee88',keywords:'魔術師・意志の力・上と下をつなぐ・道具の習熟・水星',upright:'「上にあるものは下にある」——天の意志を地上に実現させる意志と技術の統合。あなたが持っているすべての道具は、今この瞬間のために揃っている。',reversed:'自分の意志やもっている資質・能力を過去に「大した価値がない」と否定され続けた傷。誰かに笑われた記憶が、あなたの手を止めているのかもしれない。あなたの大切な道具たちは、仕舞われていただけで、今もちゃんと使える。'},
  { id:'gimel',name:'GIMEL',type:'Hebrew',subs:['The High Priestess (II)','Recall your North Star'],symbol:'ג',symbolColor:'#ccaaff',keywords:'ギメル（駱駝）・女教皇・ケテルとティファレトの道・月・内なる羅針盤',upright:'砂漠の横断——目印のない地平線でも、内なる羅針盤を信じること。論理では捉えきれない微細な感覚やインスピレーション、砂漠の厳しい気候を渡るための知恵と水分、共に、既にあなたの中にある。',reversed:'自分の望みではない光を追っている可能性があるかもしれない。他者の承認に依存する古いパターンから、自分自身の深い知恵を信頼する新しい在り方への移行を促している。'},
  { id:'daleth',name:'DALETH',type:'Hebrew',subs:['The Empress (III)','Where Grace Enters'],symbol:'ד',symbolColor:'#ffbbdd',keywords:'ダレット（扉）・道・可能性への開口部・神の恩寵を構造として受け取る・外からはわからない扉・金星',upright:'ひらめき（コクマー）と理解（ビナー）の間に立つ、見えない扉。扉であり道でもある——可能性へと通じる開口部。神の恩寵は、構造を持ってあなたの現実に降りてくる。今、その扉の前にいる。あとは、開けることを選ぶだけ。',reversed:'扉の存在に気づいていない、または見えているのに開けられない状態。過去に心を開いたとき傷ついた経験が、鍵を固く握らせているのかもしれない。でもこの扉は、外から壊されるものじゃない。あなたの内側からだけ、開く。'},
  { id:'heh',name:'HEH',type:'Hebrew',subs:['The Emperor (IV)','Structure and Authority'],symbol:'ה',symbolColor:'#ff8844',keywords:'皇帝・構造と権威・秩序を作る力・牡羊座・火の意志',upright:'心の窓をそっと開けると、言葉にならないイメージや気力が、直接あなたの軸へと流れ込んでくる。それがあなたの王国を動かす力の源。外側の承認を待たなくていい——窓を開けることが、すでに統治の始まり。',reversed:'心の窓が閉まっている、または開け方を忘れてしまっているかもしれない。でも、窓は家の中から開けるもの。今あなたがここにいるということは、安全な場所にいるということ。'},
  { id:'vav',name:'VAV',type:'Hebrew',subs:['The Hierophant (V)','Bridge of Tradition'],symbol:'ו',symbolColor:'#aabbff',keywords:'教皇・伝統と教えを橋渡しする・内なる師・牡牛座',upright:'あなたの内側から湧いてくる知恵や感覚は、あなただけのものではない。それを社会や他者と結びつけるとき、釘がものとものを繋ぐように、見えない橋が生まれる。あなたの直感を、外の世界へ持ち出していい。',reversed:'自分の知恵や感覚を外に出したとき、否定されたり無視された経験があったのかもしれない。だから繋ぐことをやめて、内側に仕舞い込んでいるのかもしれない。でもその釘は、あなたと世界を繋ぐためにある。'},
  { id:'zayin',name:'ZAYIN',type:'Hebrew',subs:['The Lovers (VI)','The Choice'],symbol:'ז',symbolColor:'#ffddaa',keywords:'恋人・選択・二つの道の前に立つ・双子座・統合か分裂か',upright:'二つの道の前に立っている。これは単なる恋愛の選択ではなく、「どの自分として生きるか」という魂の選択。あなたの心が本当に動く方を、信頼して。',reversed:'選択することへの深い恐怖。「選んだら何かを失う」「どちらも正しい気がして動けない」——その分裂の痛みそのものが、あなたが何を大切にしているかを教えてくれる。'},
  { id:'cheth',name:'CHETH',type:'Hebrew',subs:['The Chariot (VII)','Directed Will'],symbol:'ח',symbolColor:'#88ccff',keywords:'戦車・相反する力を御する意志・前進・蟹座',upright:'あなたの中に燃えている熱意や情熱——その炎を守るのは、あなた自身。何を自分の聖域に入れて、何を入れないかを決めることが、炎を消さないための柵になる。',reversed:'炎を守るための柵を作れなかった、または作り方がわからなかったのかもしれない。誰かに踏み込まれて、熱意ごと消されてしまった経験があったのかもしれない。その炎はまだ、あなたの中にある。'},
  { id:'tet',name:'TET',type:'Hebrew',subs:['Strength (VIII)','The Gentle Taming'],symbol:'ט',symbolColor:'#ffaa66',keywords:'力・優しさで野性を御する・内なる獅子・乙女座または獅子座',upright:'自分の中にある強烈な感情や衝動——その熱を、力でねじ伏せようとしなくていい。まず静かに観察する。その動きを理解したとき、蛇がしなやかに動くように、そのエネルギーは知恵に変わる。',reversed:'自分の中の強い熱や衝動を「あってはならないもの」として封じ込めてきたのかもしれない。でもその熱は、悪いものじゃなくて強いものだっただけ。'},
  { id:'yod',name:'YOD',type:'Hebrew',subs:['The Hermit (IX)','The Inner Light'],symbol:'י',symbolColor:'#ffffaa',keywords:'隠者・内なる光を灯して道を照らす・孤独な探求・乙女座',upright:'孤独の中で内なる光を灯しながら、魂の道を照らす隠者のとき。外の喧騒から離れ、自分の内側に深く降りていくことへの強烈な守護。その孤独は孤立ではなく、自分と自分、自分と世界の深い対話。',reversed:'孤立が孤独になってしまっているとき。「誰にもわかってもらえない」という深い孤独感。しかし、その孤独の深さほど、あなたの内なる光は明るい。'},
  { id:'kaf',name:'KAF',type:'Hebrew',subs:['Wheel of Fortune (X)','The Great Turning'],symbol:'כ',symbolColor:'#cc88ff',keywords:'運命の輪・大いなる循環・転機・木星・宇宙の流れに乗る',upright:'手のひらを開いているとき、豊かさと喜びは同じものになる。受け取ることが喜びで、喜ぶことが豊かさ——その循環が、今あなたの手の中で動き始めている。',reversed:'喜んでいいのか、豊かさを受け取っていいのか、どこかで許可が出せないのかもしれない。過去に手を開いたとき、奪われたり、喜びを壊された経験があったから。でも、その手のひらはちゃんと与えられる。'},
  { id:'lamed',name:'LAMED',type:'Hebrew',subs:['Justice (XI)','The Honest Mirror'],symbol:'ל',symbolColor:'#88ffdd',keywords:'正義・因果の法則・公正な目でみること・天秤座',upright:'公正な目で自分と状況を見つめるとき。感情に流されず、しかし冷酷にもならず——バランスの取れた判断が求められている。あなたの内なる正義感は、信頼できる。',reversed:'自分を裁きすぎている、または不公平な裁きを受けてきた傷。「正しくなければ愛されない」という信念の重さ。しかし正義は、あなたを罰するためにあるのではない。'},
  { id:'mem',name:'MEM',type:'Hebrew',subs:['The Hanged Man (XII)','Sacred Surrender'],symbol:'מ',symbolColor:'#88aaff',keywords:'吊るされた男・聖なる降伏・視点の180度反転・水元素',upright:'熱意や激しい感情は、水を通ることで静かに深くなる。今、あなたの強い熱意を深みと落ち着きのある言葉や知恵に変えていく流れが強くなっている。',reversed:'熱いまま言葉にしようとして、うまく伝わらなかった経験があったのかもしれない。または逆に、冷やされすぎて言葉が出てこなくなっているのかもしれない。'},
  { id:'nun',name:'NUN',type:'Hebrew',subs:['Death (XIII)','Transformation'],symbol:'נ',symbolColor:'#446688',keywords:'死・変容・終わりと始まり・蠍座・古い皮を脱ぐ',upright:'結果がどうなるかより、今この動きそのものが心地いい。その純粋な動機から生まれるエネルギーは、止まる必要がない。心地よく好きなだけ泳げるとき。',reversed:'動き続けることが止められなくなっているかもしれない。止まると何かを失う気がして、過度に動き続けてしまう。本当は疲れている自分に気づくとき。'},
  { id:'samekh',name:'SAMEKH',type:'Hebrew',subs:['Temperance (XIV)','The Alchemist'],symbol:'ס',symbolColor:'#aaffcc',keywords:'節制・錬金術・対立する力の融合・射手座',upright:'表層の自分と潜在意識が、炎の輪のように途切れず循環している。内側と外側にズレがない状態——言っていることとやっていること、見せている自分と本当の自分が、同じ場所にいる。',reversed:'表向きの自分と内側の自分にズレが生じているかもしれない。その摩擦が疲れや違和感として出てきているのかもしれない。本当はどう在りたいか、内側から問われている。'},
  { id:'ayin',name:'AYIN',type:'Hebrew',subs:['The Devil (XV)','Shadow Chains'],symbol:'ע',symbolColor:'#886644',keywords:'悪魔・シャドウの鎖・物質への執着・山羊座・見えない縛り',upright:'今のあなたを縛っている鎖を直視するとき。その鎖は外から与えられたように見えるが、実はあなた自身が握っている。シャドウの正体を見ることで、自由が始まる。',reversed:'その鎖を外す恐怖——「自由になったら何が起きるかわからない」という深い不安。その縛りは、かつてあなたを守るために必要だったもの。その歴史への敬意と共に、少しずつ手を開いていい。'},
  { id:'pe',name:'PE',type:'Hebrew',subs:['The Tower (XVI)','Sacred Destruction'],symbol:'פ',symbolColor:'#ff4422',keywords:'塔・聖なる破壊・嘘の構造物の崩壊・火星',upright:'勇気のいることを言葉にして外に出したとき、何かが解放される。その瞬間、積み上げてきたものが壊れるかもしれない。でもその口から出た言葉が、本当の自分を世界に繋ぐ。',reversed:'言いたいことが喉の奥で止まっているかもしれない。壊れることへの恐怖が、口を閉じさせている。でもその言葉は、あなたに表現してもらうのをずっと待っている。'},
  { id:'tzadi',name:'TZADI',type:'Hebrew',subs:['The Star (XVII)','Hope Returns'],symbol:'צ',symbolColor:'#aaccff',keywords:'星・希望の光・嵐のあとの静けさ・水瓶座',upright:'好きなこと、好きなものは、永遠に失われない。ただ潜在意識の深いところで眠っているだけ。その暗闇に釣り針を垂らすとき、光はちゃんと引き上げられてくる。',reversed:'好きだったものを感じられなくなっているかもしれない。失ってしまったと思っているかもしれない。でもそれは消えていない。ただ、深いところで眠っているだけ。'},
  { id:'qof',name:'QOF',type:'Hebrew',subs:['The Moon (XVIII)','The Depths Revealed'],symbol:'ק',symbolColor:'#8888cc',keywords:'月・無意識の深み・幻想と直感の境界・魚座',upright:'無意識の深みから何かが浮かび上がってきている。それは一見、不安やモヤや言葉にならない違和感かもしれない。でもそれは本能の声。自分では見えない後頭部から溢れ出る、とても大事なメッセージ。',reversed:'浮かび上がってくるものを「気のせいだ」「よくないものだ」と押し戻しているかもしれない。でもその感覚は、あなたを守るために出てきている。'},
  { id:'resh',name:'RESH',type:'Hebrew',subs:['The Sun (XIX)','Radiant Joy'],symbol:'ר',symbolColor:'#ffdd00',keywords:'太陽・輝き・子どものような喜び・成功と祝福',upright:'子どものような無垢な喜び、太陽の下で輝くとき。あなたの存在そのものが光。成功、健康、喜び——それらはすでにあなたの中にある。ただそれを、世界に向けて開いていい。',reversed:'喜ぶことへの恐怖、または輝くことへの罪悪感。「自分だけ幸せになっていいのか」という思い込み。その曇りを通しても、あなたの太陽は消えていない。'},
  { id:'shin',name:'SHIN',type:'Hebrew',subs:['Judgement (XX)','The Great Resurrection'],symbol:'שׁ',symbolColor:'#ff6600',keywords:'審判・聖なる火が過去を全肯定へ昇華する・魂の復活・火元素',upright:'歯が食べ物を砕いて栄養に変えるように、炎が木を燃やして光と熱に変えるように——今あなたの中で、何かが元の形を失いながら、全く新しいものに変容している。それは喪失ではなく、変換。',reversed:'砕かれることへの恐怖から、噛めないでいるのかもしれない。でもシンの炎は、あなたを消すためにあるんじゃない。新しい形に変えるために、ここにある。'},
  { id:'tav',name:'TAV',type:'Hebrew',subs:['The World (XXI)','Completion'],symbol:'ת',symbolColor:'#aaffaa',keywords:'世界・完成・一つのサイクルの終わりと新たな始まり・土星',upright:'一つの大きなサイクルが完成する瞬間。宇宙の舞踊の中で、あなたはすべての要素を統合した。この完成は終わりではなく、次の大きな螺旋の出発点。今、全力で祝っていい。',reversed:'完成を認められない、または次のステップへの恐怖。「もっと完璧にならないと」という思い込みで、すでに成し遂げたものを見えなくしている。あなたはすでに、十分に遠くまで来た。'},
  { id:'asgard',name:'ASGARD',type:'World',subs:['Realm of the Aesir','Divine Order'],symbol:'⚡',symbolColor:'#8899aa',keywords:'アースガルズ・神々の領域・秩序・高い志・意志と構造化',upright:'揺るぎない意志で、己の城を築く。あなたの内側に、揺るぎない秩序と意志が宿っている。外側の世界がどれほど混乱していても、あなたの内なる城は揺らがない。',reversed:'永続しない栄華への執着、または崩壊の恐怖。完璧な秩序を維持しようとして、硬直と消耗が生まれている。'},
  { id:'midgard',name:'MIDGARD',type:'World',subs:['The Human Realm','Grounded Reality'],symbol:'🌍',symbolColor:'#88aa66',keywords:'ミドガルズ・人間界・日常のリアル・今ここを生きる',upright:'神々の庇護と外側の脅威のあいだで揺れる、もっともドラマチックな場所——それが人間の世界。あなたが今この瞬間を生きているという事実そのものが、宇宙の奇跡。',reversed:'現実の「危うさ」への麻痺、または有限性への恐怖。世界が壊れそうで怖いとき、その怯えはあなたの感受性が正直なだけ。'},
  { id:'jotunheim',name:'JOTUNHEIM',type:'World',subs:['Realm of Giants','Primal Chaos'],symbol:'⛰',symbolColor:'#8899aa',keywords:'ヨトゥンヘイム・巨人族の世界・古代の力・コントロールできない自然の猛威',upright:'コントロールできない古代の力、自然の猛威のエネルギーが動いている。それに抗うのではなく、その巨大さを尊重して流れる方法を見つけるとき。',reversed:'巨大な力への恐怖、または自分の中の手に負えない感情への恐れ。しかし、ヨトゥンの力はあなたを壊すためにあるのではない。'},
  { id:'vanaheim',name:'VANAHEIM',type:'World',subs:['Realm of the Vanir','Nature Magic'],symbol:'❀',symbolColor:'#88ff88',keywords:'ヴァナヘイム・ヴァン神族の世界・自然の魔法・豊穣・フレイとフレイヤ',upright:'豊穣と自然の魔法。フレイヤの愛の力、フレイの豊穣のエネルギーが流れている。感覚的な喜び、繁栄、性的な創造力への強烈な守護。',reversed:'自然の流れや感覚的な喜びから切り離されているとき。「欲しいと思ってはいけない」という禁止令。あなたの欲望は、生命そのものの声。'},
  { id:'alfheim',name:'ALFHEIM',type:'World',subs:['Realm of Light Elves','Inspiration'],symbol:'✧',symbolColor:'#ddeeff',keywords:'アルフヘイム・光のエルフの世界・インスピレーション・創造的な火花',upright:'光のエルフが運ぶインスピレーションと創造の火花。あなたのアイデアや感性は、今、高次の領域から直接届いている。その「ひらめき」を信頼して形にするとき。',reversed:'インスピレーションが枯渇しているとき、または創造性を否定されてきた傷。光のエルフは気まぐれではない——あなたが疲れているとき、彼らは静かに待っている。'},
  { id:'svartalfheim',name:'SVARTALFHEIM',type:'World',subs:['Realm of Dark Elves','Hidden Craft'],symbol:'⚙',symbolColor:'#666688',keywords:'スヴァルタルヘイム・闇のエルフの世界・隠れた技術・深い職人芸',upright:'見えない場所での職人的な技術と努力。誰も見ていなくても、あなたは確かな技を磨いている。その地道な積み重ねが、やがて世界を変える道具を生み出す。',reversed:'隠れて作業することの孤独感、または評価されない苦しさ。しかし、ドワーフの最高の作品は、地下で生まれた。'},
  { id:'niflheim',name:'NIFLHEIM',type:'World',subs:['Realm of Mist','The Primordial Cold'],symbol:'❄',symbolColor:'#aaddff',keywords:'ニフルヘイム・霧の世界・原初の冷たさ・始原の氷・感覚の麻痺',upright:'霧の中に包まれているとき。何も見えない、何も感じられない——その無感覚は、魂が嵐の中で自分を守るための凍結。今は動かなくていい。霧はやがて晴れる。',reversed:'その凍結が長くなりすぎているとき。感情が完全に麻痺し、生きている感覚が薄くなっているとき。ニフルヘイムの氷は始まりの物質——いつか必ず、火との出会いで融ける。'},
  { id:'muspelheim',name:'MUSPELHEIM',type:'World',subs:['Realm of Fire','Primordial Destruction'],symbol:'🔥',symbolColor:'#ff6600',keywords:'ムスペルスヘイム・炎の世界・原初の火・スルトの炎・破壊的創造',upright:'原初の炎が燃え盛るとき。古いものを焼き尽くし、灰の中から新しいものが生まれる。その破壊は浄化。あなたの中の消えかけていた炎が、再び燃え上がる。',reversed:'怒りや激情のコントロールが効かなくなっているとき、または逆に炎が完全に消えてしまったとき。その炎はあなたの内側で新しいものを創るためにある。'},
  { id:'helheim',name:'HELHEIM',type:'World',subs:['Total acceptance','numbness'],symbol:'⬡',symbolColor:'#7fddff',keywords:'ヘルの領域・全受容・すべてが最終的に安らぐ場所・静水の下',upright:'静水の下——死ではなく、変容の前の静止。ラディカルな受け入れ。ヘルは冷たい女神ではなく、すべてを平等に受け入れる慈悲の場所。今のあなたに必要なのは、全受容という深い休息。',reversed:'平和と見せかけた麻痺、降伏に偽装した回避。「もう何も感じたくない」という麻痺の中にいるとき。その無感覚は、かつてあなたが生き延びるために選んだ戦略だった。'},
  { id:'valhalla',name:'VALHALLA',type:'World',subs:['Hall of the Fallen','Honored Wounds'],symbol:'⚔',symbolColor:'#ffcc66',keywords:'ヴァルハラ・英雄たちの館・名誉ある戦いの記憶・傷を誇りへ',upright:'戦って傷ついた者だけが入れる館。あなたの傷は、弱さの証拠ではなく、戦った証拠。その傷を持つあなたを、ヴァルキューレが迎えに来ている。誇りを持って立て。',reversed:'傷つくことへの恐怖、または傷を恥じ続けているとき。「こんな自分では価値がない」という思い込み。あなたの傷に刻まれた歴史こそが、最も美しい勲章。'},
  { id:'bifrost',name:'BIFROST',type:'World',subs:['The Rainbow Bridge','Between Worlds'],symbol:'🌈',symbolColor:'#ffaaff',keywords:'ビフロスト・虹の橋・世界と世界をつなぐ・見えない力が降りてくる・ダアトとの接続',upright:'見えない世界と見える世界をつなぐ虹の橋が現れているとき。神聖なものがあなたのもとへ降りてこようとしている。扉を開ける意志を持った魂だけが、この橋の上に立てる。',reversed:'橋が渡れないとき——見えない世界への不信、または「自分にはそんな価値がない」という思い込み。しかし、虹は両岸から見える。あなたの側からも、その橋は光っている。'},

  { id:'nauthiz',name:'NAUTHIZ',type:'Rune',subs:['Need · Constraint','Fire from Friction'],symbol:'ᚾ',symbolColor:'#cc8866',keywords:'必要・制約・摩擦・必要は発明の母・制限から創造が生まれる・ハガルのアエット',upright:'摩擦木から生まれた火。制限の中から創造が生まれる。今のあなたの制約は、あなたの内なる火を引き出すための摩擦。「内なる火」へのサポート。',reversed:'制約への絶望、または制限の中での自己消耗。限界を感じて絶望するとき、その苦しさはあなたが本当に限界まで頑張ってきた証拠。'},

  { id:'sowilo',name:'SOWILO',type:'Rune',subs:['From Fragmentation','to Integration'],symbol:'ᛊ',symbolColor:'#ffd966',keywords:'太陽・勝利・全体性・分裂した自己を光で統合する・ハガルのアエット',upright:'勝利のルーン、稲妻の閃光。分裂した自己を一つに戻す力——影と光が統合された全体性。あなたが自分の全体（光も影も）を受け入れたとき、その輝きは誰にも消せないものになる。',reversed:'勝利への恐れ、または光の中に立つことへの怖さ。うまくいくこと、輝くことが怖いなら、過去に光の中に立って傷ついた経験があるのかもしれない。その勝利を、あなた自身が一番先に祝ってあげよう。'},
  { id:'tiwaz',name:'TIWAZ',type:'Rune',subs:['Tyr · Justice','Sacred Sacrifice'],symbol:'ᛏ',symbolColor:'#88aaff',keywords:'テュール神・正義・自己犠牲・大義のための個人的損失・テュールのアエット',upright:'テュールは狼フェンリルを縛るために自らの右手を捧げた——大義のための個人的損失。今のあなたが選ぼうとしていること、そこには本物の誇りがある。',reversed:'自己犠牲の過剰、または正義の暴走。傷ついても正義を守ろうとするのは、あなたがその信念を命がけで信じているから。あなたを大切にすることも、正義の一部。'},
  { id:'berkana',name:'BERKANA',type:'Rune',subs:['Birch · Birth','New Growth'],symbol:'ᛒ',symbolColor:'#bbffaa',keywords:'白樺・誕生・成長・庇護・母性と再生の力・テュールのアエット',upright:'白樺の木、大地の女神。出産、成長、庇護。今、あなたの周りで何か新しいものが芽吹き始めている。今始まろうとしているものを、恐れずに育ててください。',reversed:'新しい命への恐れ、または養育の枯渇。まず自分という大地を潤してあげよう。その豊かさの上に、新しい命が育つ。土もまた栄養を必要とする。'},
  { id:'ehwaz',name:'EHWAZ',type:'Rune',subs:['Horse · Partnership','Moving Together'],symbol:'ᛖ',symbolColor:'#ddbb88',keywords:'馬・パートナーシップ・移動・信頼と相互尊重・二つが一つになる・テュールのアエット',upright:'馬と乗り手のルーン——信頼と相互尊重のパートナーシップ。二つが一つになる時に生まれる速度と優雅さ。あなたが誰かと本当の信頼で繋がっているなら、それは今最も大切にすべきもの。',reversed:'信頼への恐れ、または一方的な関係の疲弊。互いを尊重できる関係だけが、本当に遠くへ行ける。馬と乗り手はどちらも等しく大切。'},
  { id:'mannaz',name:'MANNAZ',type:'Rune',subs:['Human · Self','Know Thyself'],symbol:'ᛗ',symbolColor:'#ccbbaa',keywords:'人間・自己・知性・自己認識と内省・テュールのアエット',upright:'「汝自身を知れ」——内なる知性と社会の中での自分の位置。今のあなたは、自分自身をより深く知る時期にいる。その洞察は周囲の人々にも光をもたらす。',reversed:'自己認識の歪み、または他者との境界の喪失。人間であることそのものが、すでに知性の現れ。あなたをあなたとして見る、その目を、まず自分に向けよう。'},
  { id:'laguz',name:'LAGUZ',type:'Rune',subs:['Water · Flow','Trust the Current'],symbol:'ᛚ',symbolColor:'#88ccff',keywords:'水・流れ・直感・無意識の流れ・感情の深み・テュールのアエット',upright:'水、湖、海。無意識の流れ、直感、感情の深み。今のあなたの内なる声、感情の深み——それは信頼できる。波のように形を変えながら本質を保つ。',reversed:'感情の氾濫、または直感への不信。水は形を変えながら、どこまでも流れ続ける。あなたの直感もまた、止まっていない。その流れに、そっと乗ってみよう。'},
  { id:'ingwaz',name:'INGWAZ',type:'Rune',subs:['Ing · Potential','Inner Completion'],symbol:'ᛜ',symbolColor:'#aaffcc',keywords:'イング神・潜在力・完成・種の中に眠る完全な可能性・テュールのアエット',upright:'豊穣の神イング（フレイ）のルーン。種の中に眠る完全な可能性——内側に集められたエネルギー。今見えていなくても、あなたの内側では完成に向かうプロセスが進んでいる。',reversed:'見えない成果への焦り、または完成を外に出す怖さ。種は暗闇の中でこそ育つ。あなたの内的完成は本物。その準備が整ったとき、あなたは自然に外へと向かえる。'},
  { id:'dagaz',name:'DAGAZ',type:'Rune',subs:['Dawn · Breakthrough','Threshold Moment'],symbol:'ᛞ',symbolColor:'#ffeeaa',keywords:'夜明け・突破口・変容・意識の覚醒・暗闇が突然光に変わる転換点・テュールのアエット',upright:'夜明けの光、昼と夜の境界点。突破口、劇的な変容の瞬間。今、あなたはその閾値の上に立っている。もう少し。その扉の向こうに、あなたが待っていた光がある。',reversed:'夜明け前の絶望、または突破口への恐れ。あなたがこれだけ暗闇を歩いてきたことが、光がすぐそこにある証拠。夜明けは来る。その閾値を、一歩だけ、渡ってみよう。'},
  { id:'othala',name:'OTHALA',type:'Rune',subs:['Homeland · Heritage','Return to Root'],symbol:'ᛟ',symbolColor:'#ddbb66',keywords:'故郷・遺産・帰属・先祖の土地・血のつながり・自分が自分であることの根源・テュールのアエット',upright:'フサークの最後のルーン。先祖の土地、受け継がれる遺産。今のあなたは、自分の根っこへと帰る旅の途中にいる。あなたが自分のルーツを大切にするとき、そこから無限の力が湧いてくる。',reversed:'帰れない故郷への哀愁、またはルーツからの切断。あなたの中に、すでに故郷がある。あなたが自分自身でいる場所、そこがあなたの故郷。'},
];

let activeType = 'all';
let searchQuery = '';
let selected = new Set();

function updateTray() {
  const tray = document.getElementById('tray');
  const chips = document.getElementById('trayChips');
  if (selected.size === 0) { tray.classList.remove('visible'); return; }
  tray.classList.add('visible');
  chips.innerHTML = '';
  selected.forEach(id => {
    const c = CARDS.find(x => x.id === id);
    if (!c) return;
    const chip = document.createElement('div');
    chip.className = 'tray-chip';
    chip.innerHTML = `<span style="color:${c.symbolColor}">${c.symbol}</span>${c.name}<span class="remove">✕</span>`;
    chip.addEventListener('click', () => { selected.delete(id); updateTray(); render(); });
    chips.appendChild(chip);
  });
}

function render() {
  const list = document.getElementById('cardList');
  const noResults = document.getElementById('noResults');
  const countEl = document.getElementById('count');
  const filtered = CARDS.filter(c => {
    const typeMatch = activeType === 'all' || c.type === activeType;
    const q = searchQuery.toLowerCase();
    const textMatch = !q || c.name.toLowerCase().includes(q) || c.keywords.toLowerCase().includes(q) || c.subs.join(' ').toLowerCase().includes(q);
    return typeMatch && textMatch;
  });
  countEl.textContent = filtered.length + ' / 68 枚' + (selected.size > 0 ? `　✦ ${selected.size}枚選択中` : '');
  list.innerHTML = '';
  noResults.style.display = filtered.length === 0 ? 'block' : 'none';
  filtered.forEach(card => {
    const isSelected = selected.has(card.id);
    const item = document.createElement('div');
    item.className = 'card-item' + (isSelected ? ' selected' : '');
    item.innerHTML = `
      <div class="card-header">
        <div class="check-box">${isSelected ? '✦' : ''}</div>
        <div class="card-symbol" style="color:${card.symbolColor}">${card.symbol}</div>
        <div class="card-title-wrap">
          <span class="card-name">${card.name}</span>
          <span class="card-sub">${card.subs[1] || card.subs[0]}</span>
        </div>
        <span class="card-type-badge badge-${card.type}">${card.type}</span>
      </div>`;
    item.addEventListener('click', () => {
      if (selected.has(card.id)) selected.delete(card.id);
      else selected.add(card.id);
      updateTray(); render();
    });
    list.appendChild(item);
  });
}

function openModal() {
  const modal = document.getElementById('viewModal');
  const container = document.getElementById('modalCards');
  const title = document.getElementById('modalTitle');
  title.textContent = `SELECTED  ✦  ${selected.size} CARDS`;
  container.innerHTML = '';
  selected.forEach(id => {
    const c = CARDS.find(x => x.id === id);
    if (!c) return;
    const el = document.createElement('div');
    el.className = 'modal-card';
    el.innerHTML = `
      <div class="modal-card-header">
        <div class="modal-symbol" style="color:${c.symbolColor}">${c.symbol}</div>
        <div>
          <div class="modal-name">${c.name}</div>
          <div class="modal-sub">${c.subs[1] || c.subs[0]}</div>
        </div>
      </div>
      <div class="modal-card-body">
        <div class="modal-img-wrap">
          <img class="modal-img" src="${BASE}images/${c.id}.png" alt="${c.name}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
          <div class="img-placeholder" style="display:none">${c.symbol}</div>
        </div>
        <div class="modal-keywords">${c.keywords}</div>
        <div class="modal-section">
          <div class="modal-label"><span>☀️</span> 正位置</div>
          <div class="modal-text">${c.upright}</div>
        </div>
        <div class="modal-section">
          <div class="modal-label"><span>🌙</span> 逆位置</div>
          <div class="modal-text">${c.reversed}</div>
        </div>
      </div>`;
    container.appendChild(el);
  });
  modal.classList.add('open');
  modal.scrollTop = 0;
}

document.getElementById('btnView').addEventListener('click', openModal);
document.getElementById('btnClose').addEventListener('click', () => document.getElementById('viewModal').classList.remove('open'));
document.getElementById('btnClear').addEventListener('click', () => { selected.clear(); updateTray(); render(); });
document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; render(); });
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeType = btn.dataset.type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

render();
</script>
